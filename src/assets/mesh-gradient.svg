<svg xmlns="http://www.w3.org/2000/svg" id="mesh-gradient" 
	    width="750" height="500" viewBox="0 0 750 500" >
	        <defs>
	            <filter id="blur" filterUnits="userSpaceOnUse" x="0" y="0" width="750" height="500">
	                <feGaussianBlur stdDeviation="126" />
	            </filter>
	            <filter id="noise" x="0" y="0" width="100%" height="100%">
				<feTurbulence type="fractalNoise" baseFrequency="1" octaves="3" result="turbulence" stitchTiles="stitch" />
				<feBlend in="SourceGraphic" in2="turbulence" mode="overlay" />
			</filter>
	        </defs>
	        <rect id="background" width="100%" height="100%" fill="#FFFFFF" />
	        <g id="swatches" width="750" height="500" filter="url(#blur)"><rect x="-86.95537166371003" y="211.36920017965957" width="589.0193018083122" height="539.0683778317955" fill="#FFFFFF" /><rect x="-154.18357792879692" y="-150.43772985869094" width="401.57900038571245" height="435.431250557542" fill="#A5EAFF" /><rect x="233.2297116540633" y="-125.21436542034765" width="329.90771252194554" height="313.14901088921323" fill="#97BADC" /></g>
	    	<rect x="0" y="0" width="750" height="500" 
	    	style="mix-blend-mode: soft-light; filter: url(#noise); opacity: 10%"></rect>
    	</svg>